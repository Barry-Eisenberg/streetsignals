name: Update Signals

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: update-signals
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run updater
        run: python scripts/update_signals.py

      - name: Commit and push if changed
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add auto_data.json intel_briefs.json
          if git diff --cached --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "chore(data): refresh auto signals and intelligence briefs"
          BRANCH="${GITHUB_REF_NAME:-${GITHUB_REF#refs/heads/}}"
          if [ -z "${BRANCH}" ]; then
            BRANCH="${DEFAULT_BRANCH:-main}"
          fi
          echo "Pushing to branch: ${BRANCH}"
          # Actions checkout is detached; rebase against the target branch and
          # push explicitly to that branch to avoid pull failures.
          git fetch origin "${BRANCH}"
          git rebase "origin/${BRANCH}"
          git push origin "HEAD:${BRANCH}"
