name: Update Signals

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

concurrency:
  group: update-signals
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run updater
        run: python scripts/update_signals.py

      - name: Commit and push if changed
        env:
          DATA_PUSH_TOKEN: ${{ secrets.DATA_PUSH_TOKEN }}
          GITHUB_TOKEN_FALLBACK: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Workflow SHA: ${GITHUB_SHA}"
          echo "Actor: ${GITHUB_ACTOR}"
          echo "Ref: ${GITHUB_REF}"

          PUSH_TOKEN="${DATA_PUSH_TOKEN:-}"
          if [ -z "${PUSH_TOKEN}" ]; then
            echo "DATA_PUSH_TOKEN unavailable. Falling back to github.token."
            PUSH_TOKEN="${GITHUB_TOKEN_FALLBACK}"
          fi
          if [ -z "${PUSH_TOKEN}" ]; then
            echo "No push token available."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/auto_data.json data/intel_briefs.json
          if git diff --cached --quiet; then
            echo "No data changes — skipping push."
            exit 0
          fi
          git commit -m "chore(data): refresh auto signals and intelligence briefs"
          # Use token-authenticated remote so the push is accepted even when
          # the checkout URL doesn't carry credentials.
          git config --global --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${{ github.repository }}.git"
          echo "Attempting push to main..."
          git push --verbose origin HEAD:main 2>&1 || { echo "Push failed — see error above."; exit 1; }
