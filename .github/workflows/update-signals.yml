name: Update Signals

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: update-signals
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run updater
        run: python scripts/update_signals.py

      - name: Commit and push if changed
        env:
          DATA_PUSH_TOKEN: ${{ secrets.DATA_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          echo "Workflow SHA: ${GITHUB_SHA}"
          echo "Actor: ${GITHUB_ACTOR}"
          echo "Ref: ${GITHUB_REF}"
          if [ -z "${DATA_PUSH_TOKEN:-}" ]; then
            echo "DATA_PUSH_TOKEN is empty or unavailable to this run."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add auto_data.json intel_briefs.json
          if git diff --cached --quiet; then
            echo "No data changes — skipping push."
            exit 0
          fi
          git commit -m "chore(data): refresh auto signals and intelligence briefs"
          # Use token-authenticated remote so the push is accepted even when
          # the checkout URL doesn't carry credentials.
          git remote set-url origin "https://x-access-token:${DATA_PUSH_TOKEN}@github.com/${{ github.repository }}.git"
          echo "Attempting push to main..."
          git push --verbose origin HEAD:main 2>&1 || { echo "Push failed — see error above."; exit 1; }
