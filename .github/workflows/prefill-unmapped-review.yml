name: Prefill Unmapped Review

on:
  workflow_dispatch:
  schedule:
    - cron: "15 7 * * *"

concurrency:
  group: prefill-unmapped-review
  cancel-in-progress: false

jobs:
  prefill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install workbook dependency
        run: python -m pip install --upgrade pip openpyxl

      - name: Prefill review artifacts
        run: python scripts/prefill_unmapped_review.py --scope strict --map-min-confidence high

      - name: Commit and push if changed
        env:
          DATA_PUSH_TOKEN: ${{ secrets.DATA_PUSH_TOKEN }}
          GITHUB_TOKEN_FALLBACK: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Workflow SHA: ${GITHUB_SHA}"
          echo "Actor: ${GITHUB_ACTOR}"
          echo "Ref: ${GITHUB_REF}"

          PUSH_TOKEN="${DATA_PUSH_TOKEN:-}"
          if [ -z "${PUSH_TOKEN}" ]; then
            echo "DATA_PUSH_TOKEN unavailable. Falling back to github.token."
            PUSH_TOKEN="${GITHUB_TOKEN_FALLBACK}"
          fi
          if [ -z "${PUSH_TOKEN}" ]; then
            echo "No push token available."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/unmapped_review_first_pass.csv data/unmapped_review_first_pass.xlsx data/unmapped_review_dashboard.html
          if git diff --cached --quiet; then
            echo "No review artifact changes — skipping push."
            exit 0
          fi
          git commit -m "chore(review): prefill unmapped review artifacts"
          git config --global --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${{ github.repository }}.git"
          echo "Attempting push to main..."
          git push --verbose origin HEAD:main 2>&1 || { echo "Push failed — see error above."; exit 1; }